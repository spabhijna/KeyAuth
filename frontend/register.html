<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KeyAuth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        
        <!-- Step 1: Account Details -->
        <div id="step1">
            <form id="accountForm">
                <input type="text" id="username" placeholder="Username" required minlength="3">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required minlength="6">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <button type="submit">Continue to Typing Training</button>
            </form>
            <p class="link">Already have an account? <a href="login.html">Login</a></p>
        </div>

        <!-- Step 2: Typing Sample Collection -->
        <div id="step2" style="display: none;">
            <p class="instruction">Type the phrase below <strong>20 times</strong> to train your typing pattern.</p>
            
            <div class="progress-section">
                <p>Samples collected: <span id="sampleCount">0</span> / 20</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <p class="phrase" id="phraseDisplay">Loading phrase...</p>
            <input type="text" id="typingInput" placeholder="Type here..." autocomplete="off">
            <p id="matchStatus" class="match-status"></p>
            
            <button id="submitSampleBtn" disabled>Submit Sample</button>
            <button id="registerBtn" disabled>Complete Registration</button>
            
            <div style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px;">
                <p style="font-size: 0.9em; color: #666;">Developer Tools:</p>
                <button id="downloadSamplesBtn" type="button" disabled>Download Samples (JSON)</button>
                <input type="file" id="loadSamplesInput" accept=".json" style="display: none;">
                <button id="loadSamplesBtn" type="button">Load Samples (JSON)</button>
            </div>
        </div>
        
        <p id="message"></p>
    </div>

    <script>
        // Account details storage
        let accountDetails = {};
        
        // Typing sample collection
        let REQUIRED_PHRASE = '';
        let currentKeystrokes = [];
        let allSamples = [];
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const message = document.getElementById('message');

        // Step 1: Account form submission
        document.getElementById('accountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                message.textContent = 'Passwords do not match';
                message.style.color = 'red';
                return;
            }

            // Store account details for later
            accountDetails = { username, email, password };
            
            // Load phrase and switch to step 2
            await loadPhrase();
            step1.style.display = 'none';
            step2.style.display = 'block';
            message.textContent = '';
            
            // Focus typing input
            document.getElementById('typingInput').focus();
        });

        // Load phrase from API
        async function loadPhrase() {
            try {
                const res = await fetch('http://localhost:8000/phrase');
                const data = await res.json();
                REQUIRED_PHRASE = data.phrase;
                document.getElementById('phraseDisplay').textContent = REQUIRED_PHRASE;
            } catch (err) {
                REQUIRED_PHRASE = 'secure login verification';
                document.getElementById('phraseDisplay').textContent = REQUIRED_PHRASE;
            }
        }

        // Typing input event handlers
        const input = document.getElementById('typingInput');
        const submitBtn = document.getElementById('submitSampleBtn');
        const registerBtn = document.getElementById('registerBtn');
        const matchStatus = document.getElementById('matchStatus');
        const sampleCount = document.getElementById('sampleCount');
        const progressFill = document.getElementById('progressFill');

        input.addEventListener('keydown', (e) => {
            currentKeystrokes.push({
                key: e.key,
                type: 'down',
                time: performance.now()
            });
        });

        input.addEventListener('keyup', (e) => {
            currentKeystrokes.push({
                key: e.key,
                type: 'up',
                time: performance.now()
            });
            updateMatchStatus();
        });

        function updateMatchStatus() {
            const typed = input.value;
            if (typed === REQUIRED_PHRASE) {
                matchStatus.textContent = '✓ Phrase matches - Click "Submit Sample"';
                matchStatus.className = 'match-status match';
                submitBtn.disabled = false;
            } else {
                matchStatus.textContent = typed.length > 0 ? '✗ Keep typing...' : '';
                matchStatus.className = 'match-status no-match';
                submitBtn.disabled = true;
            }
        }

        function updateProgress() {
            sampleCount.textContent = allSamples.length;
            progressFill.style.width = `${(allSamples.length / 20) * 100}%`;
            
            // Enable download if we have any samples
            document.getElementById('downloadSamplesBtn').disabled = allSamples.length === 0;
            
            if (allSamples.length >= 20) {
                registerBtn.disabled = false;
                registerBtn.textContent = `Complete Registration (${allSamples.length} samples)`;
            }
        }

        submitBtn.addEventListener('click', () => {
            if (input.value !== REQUIRED_PHRASE) return;

            allSamples.push([...currentKeystrokes]);
            currentKeystrokes = [];
            input.value = '';
            matchStatus.textContent = '';
            submitBtn.disabled = true;
            
            updateProgress();
            
            if (allSamples.length < 20) {
                message.textContent = `Sample ${allSamples.length} saved! Type the phrase again.`;
                message.style.color = 'green';
            } else {
                message.textContent = 'Ready! Click "Complete Registration" to finish.';
                message.style.color = 'green';
                input.disabled = true;
            }
        });

        registerBtn.addEventListener('click', async () => {
            if (allSamples.length < 20) {
                message.textContent = 'Need at least 20 samples';
                message.style.color = 'red';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';
            message.textContent = 'Creating account and training model...';
            message.style.color = '#667eea';

            try {
                const res = await fetch('http://localhost:8000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...accountDetails,
                        samples: allSamples
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    message.textContent = 'Account created! Redirecting to login...';
                    message.style.color = 'green';
                    
                    localStorage.setItem('username', accountDetails.username);
                    localStorage.setItem('user_id', data.user_id);
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    message.textContent = data.detail || 'Registration failed';
                    message.style.color = 'red';
                    registerBtn.disabled = false;
                    registerBtn.textContent = `Complete Registration (${allSamples.length} samples)`;
                }
            } catch (err) {
                message.textContent = 'Connection error';
                message.style.color = 'red';
                registerBtn.disabled = false;
                registerBtn.textContent = `Complete Registration (${allSamples.length} samples)`;
            }
        });

        // Download samples as JSON
        document.getElementById('downloadSamplesBtn').addEventListener('click', () => {
            const data = {
                phrase: REQUIRED_PHRASE,
                samples: allSamples,
                timestamp: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `typing_samples_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            message.textContent = `Downloaded ${allSamples.length} samples`;
            message.style.color = 'green';
        });

        // Load samples from JSON
        document.getElementById('loadSamplesBtn').addEventListener('click', () => {
            document.getElementById('loadSamplesInput').click();
        });

        document.getElementById('loadSamplesInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.samples && Array.isArray(data.samples)) {
                        allSamples = data.samples;
                        updateProgress();
                        message.textContent = `Loaded ${allSamples.length} samples from file`;
                        message.style.color = 'green';
                        
                        if (allSamples.length >= 20) {
                            input.disabled = true;
                        }
                    } else {
                        message.textContent = 'Invalid file format';
                        message.style.color = 'red';
                    }
                } catch (err) {
                    message.textContent = 'Failed to parse JSON file';
                    message.style.color = 'red';
                }
            };
            reader.readAsText(file);
            e.target.value = ''; // Reset input
        });
    </script>
</body>
</html>
