<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KeyAuth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Username" required minlength="3">
            <input type="email" id="email" placeholder="Email (optional)">
            <input type="password" id="password" placeholder="Password" required minlength="6">
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <p id="message"></p>
        <p class="link">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value || null;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const message = document.getElementById('message');

            // Validate passwords match
            if (password !== confirmPassword) {
                message.textContent = 'Passwords do not match';
                message.style.color = 'red';
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    message.textContent = 'Account created! Redirecting to training...';
                    message.style.color = 'green';
                    
                    // Store user info for training
                    localStorage.setItem('username', username);
                    localStorage.setItem('user_id', data.user_id);
                    
                    // Redirect to training page after short delay
                    setTimeout(() => {
                        window.location.href = 'train.html';
                    }, 1500);
                } else {
                    message.textContent = data.detail || 'Registration failed';
                    message.style.color = 'red';
                }
            } catch (error) {
                message.textContent = 'Connection error';
                message.style.color = 'red';
            }
        });
    </script>
</body>
</html>
