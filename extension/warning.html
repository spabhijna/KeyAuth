<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KeyAuth Warning</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .warning-box {
      text-align: center;
      padding: 40px;
      background: #fff3f3;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(220, 53, 69, 0.1);
      margin-top: 40px;
    }
    .warning-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #dc3545 0%, #ff6f61 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 32px;
      color: white;
    }
    .warning-box h2 {
      color: #dc3545;
      margin-bottom: 10px;
    }
    .warning-box p {
      color: #666;
      font-size: 15px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="warning-box">
      <div class="warning-icon">⚠️</div>
      <h2>Suspicious Activity Detected</h2>
      <p>Your typing pattern did not match our records.</p>
      <p>For your security, Gmail access has been blocked.</p>
      <p>If this was a mistake, please contact support or try again later.</p>
    </div>
  </div>
</body>
</html>
